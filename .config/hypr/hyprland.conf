#####################
#### HYPRLAND :D ####
#####################

################
### MONITORS ###
################

monitor=eDP-1,1920x1080@60,0x0,1 # primary monitor 
monitor=HDMI-A-2,1440x900@60,1920x0,1 # secondary monitor

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$browser = flatpak run app.zen_browser.zen 
$menu = rofi -show drun -show-icons
$screenshot = hyprshot -m region -o Imagens/Screenshots/
$powermenu = wlogout
$picker = hyprpicker -a -n

#################
### AUTOSTART ###
#################

exec-once = dbus-updateactivation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GTK_THEME
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hyprpaper 
exec-once = waybar
exec-once = nwg-dock-hyprland -d -a bottom
exec-once = nm-applet
exec-once = blueman-applet
exec-once = swaync
exec-once = kbuildsycoca6

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Cursor for wayland and xorg 
env = XCURSOR_THEME,breeze_dark_red
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

# Firefox and electron
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# Window Integrations (GTK, Qt, SDL)
env = GDK_BACKEND,wayland,x11
env = GTK_USE_PORTAL,1
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = SDL_VIDEO_EGL_ALLOW_TRANSPARENCY,1

# Qt Theme and Behavior 
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# xdg menu prefix for plasma
env = XDG_MENU_PREFIX,plasma-

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

